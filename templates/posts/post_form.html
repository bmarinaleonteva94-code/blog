{% extends "base.html" %}

{% block content %}

<h1 class="text-2xl font-bold">Новый пост</h1>

<form class="flex flex-col gap-4">
    <div>
        <label for="title" class="block text-sm  text-zinc-500">Заголовок</label>
        <input 
            type="text" 
            id="title"
            name="title"
            placeholder="Заголовок"
            class="w-full px-4 py-2 border border-zinc-300 text-base rounded-lg">
    </div>

    <div>
        <label for="text" class=" block text-sm  text-zinc-500">Текст</label>
        <textarea 
            id="text"
            name="text"
            placeholder="Текст поста"
            class="w-full px-4 py-2 border border-zinc-300 text-base rounded-lg min-h-20"></textarea>
    </div>

    <button type="submit" class="flex items-center justify-center h-11 px-6 bg-black text-white text-base font-medium rounded-lg">Создать</button>
</form>

{% endblock %}
